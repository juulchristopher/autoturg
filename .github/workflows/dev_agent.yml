name: Dev agent

# Triggered when a GitHub Issue is labeled 'claude'.
# Claude Code implements the task, commits to a branch, and opens a PR.
# The PR auto-merges when CI passes (requires auto-merge enabled in repo settings).

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: contains(github.event.label.name, 'claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Check pause flag
        id: guard
        run: |
          git pull origin main --quiet 2>/dev/null || true
          if [ -f ".agent_paused" ]; then
            echo "paused=true" >> $GITHUB_OUTPUT
            RESET=$(python3 -c "import json; d=json.load(open('.agent_paused')); print(d.get('reset_at','unknown'))" 2>/dev/null || echo "unknown")
            echo "reset_at=$RESET" >> $GITHUB_OUTPUT
          else
            echo "paused=false" >> $GITHUB_OUTPUT
          fi

      - name: Pause and re-queue
        if: steps.guard.outputs.paused == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body ":pause_button: Dev agent paused — token limit active. Will resume at: \`${{ steps.guard.outputs.reset_at }}\`"
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "claude" \
            --add-label "paused-mid-run"
          exit 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create working branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          SLUG=$(echo "${{ github.event.issue.title }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')
          BRANCH="claude/issue-${ISSUE_NUM}-${SLUG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: Run dev agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p "
          You are a senior full-stack developer implementing a GitHub Issue.

          Repo: ${{ github.repository }}
          Issue #${{ steps.branch.outputs.issue_num }}: ${{ github.event.issue.title }}

          Full issue description:
          ${{ github.event.issue.body }}

          Recent commits for context:
          $(git log --oneline -15)

          Relevant docs:
          $(cat CLAUDE.md 2>/dev/null | head -100)

          Your job:
          1. Understand what needs to be built from the issue title + description
          2. Read relevant existing files before making changes
          3. Implement the feature or fix — follow the conventions in CLAUDE.md
          4. Make sure the TypeScript build passes: run 'npm run build'
          5. If build fails, fix the errors and try again
          6. Commit your changes with a descriptive message

          Rules:
          - Only change what is needed for this specific issue
          - Do not refactor unrelated code
          - Follow existing patterns in the codebase
          - Commit message format: short imperative, e.g. 'Add dark mode toggle'
          "

      - name: Push branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin ${{ steps.branch.outputs.branch }}

      - name: Open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "${{ github.event.issue.title }}" \
            --body "Closes #${{ steps.branch.outputs.issue_num }}

          Implemented by the dev agent in response to issue #${{ steps.branch.outputs.issue_num }}." \
            --base main \
            --head ${{ steps.branch.outputs.branch }})
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.branch.outputs.branch }} \
            --auto \
            --squash \
            2>/dev/null || echo "Auto-merge not available — PR will need manual merge"

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.branch.outputs.issue_num }} \
            --body ":white_check_mark: Dev agent finished. PR opened: ${{ steps.pr.outputs.pr_url }}"
